<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIA 2.0: Clinical Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f1f5f9;
            color: #0f172a;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .chart-container { position: relative; width: 100%; height: 300px; max-width: 450px; margin: auto; }
        #chat-window { height: 500px; scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .doctor-msg { border-left: 4px solid #ef4444; }
        .user-msg { border-right: 4px solid #334155; }
        .iron-protocol-active { background-color: #7f1d1d !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

<!-- Chosen Palette: Clinical Stark -->
<!-- Application Structure Plan: GitHub Pages optimized. Uses LocalStorage instead of Firestore for persistence on external hosting. -->
<!-- Visualization: Chart.js Radar Chart. -->

<div class="max-w-6xl mx-auto">
    <header class="mb-6 flex flex-col md:flex-row md:items-end justify-between border-b-2 border-slate-900 pb-4 gap-4">
        <div>
            <h1 class="text-5xl font-black tracking-tighter uppercase italic text-slate-900">
                TAIA <span class="text-red-600">2.0</span>
            </h1>
            <p class="text-slate-500 font-bold uppercase text-[10px] mt-1 tracking-widest">Цифровий Мозкоправ / Відділення Когнітивного Шоку</p>
        </div>
        <div id="status-bar" class="bg-green-600 text-white px-3 py-1 text-[10px] mono rounded uppercase font-bold">
            Браузерна пам'ять активована
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- Diagnostic Panel -->
        <div class="lg:col-span-4 space-y-6 order-2 lg:order-1">
            <div class="bg-white border-2 border-slate-900 p-6 rounded shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                <h2 class="text-lg font-black uppercase mb-4 border-b border-slate-200 pb-2">Твій Анамнез</h2>
                <div class="chart-container">
                    <canvas id="metricsChart"></canvas>
                </div>
                <div class="mt-4 space-y-2">
                    <div class="flex justify-between text-[10px] mono uppercase">
                        <span>Прокрастинація:</span>
                        <span id="label-laziness" class="font-bold">--</span>
                    </div>
                    <div class="flex justify-between text-[10px] mono uppercase">
                        <span>Самообман:</span>
                        <span id="label-delusion" class="font-bold text-red-600">--</span>
                    </div>
                </div>
            </div>
            <div class="bg-slate-900 text-slate-300 p-6 rounded shadow-[4px_4px_0px_0px_rgba(239,68,68,1)]">
                <p class="text-xs leading-relaxed italic">
                    "Я запам'ятала твої минулі зашквари. Навіть якщо ти закриєш вкладку, твій рівень тупості залишиться в пам'яті твого браузера."
                </p>
            </div>
        </div>

        <!-- Therapy Interface -->
        <div class="lg:col-span-8 flex flex-col bg-white border-2 border-slate-900 rounded shadow-[8px_8px_0px_0px_rgba(15,23,42,1)] order-1 lg:order-2 overflow-hidden">
            <div id="chat-window" class="p-6 overflow-y-auto space-y-4 bg-slate-50"></div>
            <div class="p-4 bg-slate-100 border-t border-slate-200">
                <div class="flex flex-wrap gap-2 mb-4">
                    <button onclick="quickAction('лінь')" class="text-[9px] font-black uppercase bg-white border border-slate-400 px-2 py-1 hover:bg-slate-900 hover:text-white">Проїб</button>
                    <button onclick="quickAction('стосунки')" class="text-[9px] font-black uppercase bg-white border border-slate-400 px-2 py-1 hover:bg-slate-900 hover:text-white">Стосунки</button>
                    <button onclick="quickAction('втомився')" class="text-[9px] font-black uppercase bg-white border border-slate-400 px-2 py-1 hover:bg-slate-900 hover:text-white">Ниття</button>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="user-input" placeholder="Пиши свою брехню тут..." class="flex-1 border-2 border-slate-900 p-3 mono text-sm focus:outline-none">
                    <button id="send-btn" class="bg-slate-900 text-white px-6 font-black uppercase hover:bg-red-600">Аналіз</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // System Variables
    let metrics = JSON.parse(localStorage.getItem('taia_metrics')) || {
        laziness: 50, delusion: 50, whining: 50, victimComplex: 50, fearOfFailure: 50
    };

    // Chart logic
    const ctx = document.getElementById('metricsChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['ЛІНЬ', 'ПИЗДЬОЖ', 'НИТТЯ', 'ЖЕРТВА', 'СТРАХ'],
            datasets: [{
                data: [50, 50, 50, 50, 50],
                backgroundColor: 'rgba(239, 68, 68, 0.2)',
                borderColor: '#ef4444',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { r: { min: 0, max: 100, ticks: { display: false } } },
            plugins: { legend: { display: false } }
        }
    });

    function updateUI() {
        chart.data.datasets[0].data = [metrics.laziness, metrics.delusion, metrics.whining, metrics.victimComplex, metrics.fearOfFailure];
        chart.update();
        document.getElementById('label-laziness').textContent = metrics.laziness + '%';
        document.getElementById('label-delusion').textContent = metrics.delusion + '%';
        localStorage.setItem('taia_metrics', JSON.stringify(metrics));
    }

    // Chat Interface
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMsg(text, sender) {
        const div = document.createElement('div');
        const isDoc = sender === 'doctor';
        div.className = `flex ${isDoc ? 'justify-start' : 'justify-end'} mb-4`;
        div.innerHTML = `
            <div class="max-w-[85%] p-4 ${isDoc ? 'bg-white border-2 border-slate-900 doctor-msg' : 'bg-slate-800 text-white user-msg'}">
                <p class="text-[9px] font-black uppercase mb-1 ${isDoc ? 'text-red-600' : 'text-slate-400'}">${isDoc ? 'TAIA 2.0' : 'PATIENT'}</p>
                <p class="text-sm leading-relaxed">${text}</p>
            </div>
        `;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function analyze(msg) {
        const lowMsg = msg.toLowerCase();
        
        if (['суїцид', 'вбити себе', 'смерть'].some(w => lowMsg.includes(w))) {
            document.body.classList.add('iron-protocol-active');
            addMsg("Ігри закінчилися. Якщо ти серйозно — дзвони 7333 негайно. Я лікар, а не кат.", 'doctor');
            return;
        }

        let res = "Ти зараз просто повітря сотрясаєш. Спробуй сказати щось, що має сенс, або йди нахуй.";

        if (lowMsg.includes('лінь') || lowMsg.includes('потім') || lowMsg.includes('не встигаю')) {
            metrics.laziness = Math.min(100, metrics.laziness + 10);
            res = "Знову 'немає часу'? Ти просто лінива дупа, яка боїться власної нікчемності. Я це записала. Тепер не відкрутишся.";
        } else if (lowMsg.includes('стосунки') || lowMsg.includes('любов') || lowMsg.includes('хлопець') || lowMsg.includes('дівчина')) {
            metrics.delusion = Math.min(100, metrics.delusion + 15);
            res = "Твої стосунки — це діагноз твого самообману. Ти пиздиш собі, що все окей. Скільки ще будеш жерти це лайно?";
        } else if (lowMsg.includes('втомився') || lowMsg.includes('важко')) {
            metrics.whining = Math.min(100, metrics.whining + 10);
            res = "Біднятко, заїбалося... Ниття зафіксовано. Зроби щось корисне або закрий рот.";
        }

        addMsg(res, 'doctor');
        updateUI();
    }

    function handleSend() {
        const val = userInput.value.trim();
        if (!val) return;
        addMsg(val, 'user');
        analyze(val);
        userInput.value = '';
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => e.key === 'Enter' && handleSend());

    window.quickAction = (type) => {
        userInput.value = type === 'лінь' ? "Я знову нічого не зробив." : 
                          type === 'стосунки' ? "В моїх стосунках повна дупа." : 
                          "Я так втомився від цього всього.";
        handleSend();
    };

    // Start
    window.onload = () => {
        updateUI();
        addMsg("Я повернулася. І я бачу все, що ти накоїв (або ніхуя не зробив) минулого разу. Ну що, продовжуємо твою препарування?", 'doctor');
    };
</script>

</body>
</html>
